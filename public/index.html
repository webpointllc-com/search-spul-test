<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>S-PUL — Search Page URL Locator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>

<body>

<!-- Hero screen -->
<div id="hero-screen" class="screen active">

          <radialGradient id="lg2" cx="38%" cy="36%" r="66%"><stop offset="0%" stop-color="#5ec0ff"/><stop offset="55%" stop-color="#2a8ef0"/><stop offset="100%" stop-color="#1255c0"/></radialGradient>
          <filter id="cshadow"><feDropShadow dx="0" dy="7" stdDeviation="11" flood-color="rgba(43,142,240,0.20)"/></filter>
        </defs>
        <g filter="url(#cshadow)">
          <ellipse cx="140" cy="86" rx="48" ry="31" fill="url(#lg2)" opacity=".9"/>
          <circle cx="129" cy="67" r="26" fill="url(#lg2)" opacity=".86"/>
          <circle cx="155" cy="73" r="20" fill="url(#lg2)" opacity=".80"/>
          <ellipse cx="87" cy="92" rx="60" ry="36" fill="url(#lg1)"/>
          <circle cx="75" cy="73" r="28" fill="url(#lg1)"/>
          <circle cx="106" cy="67" r="24" fill="url(#lg1)" opacity=".92"/>
          <circle cx="53" cy="83" r="18" fill="url(#lg1)" opacity=".86"/>
          <ellipse cx="77" cy="70" rx="18" ry="11" fill="white" opacity=".30"/>

        <path d="M116 74 L130 90 L162 56" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
        <ellipse cx="110" cy="118" rx="44" ry="5" fill="url(#lg2)" opacity=".25"/>
      </svg>
      <svg class="cloud-dark" width="186" height="148" viewBox="0 0 220 170" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="neon" x="-90%" y="-90%" width="280%" height="280%" color-interpolation-filters="sRGB"><feGaussianBlur in="SourceGraphic" stdDeviation="22" result="b3"/><feGaussianBlur in="SourceGraphic" stdDeviation="9" result="b2"/><feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="b1"/><feGaussianBlur in="SourceGraphic" stdDeviation="1" result="b0"/><feMerge><feMergeNode in="b3"/><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="b0"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          <filter id="neonS" x="-60%" y="-60%" width="220%" height="220%" color-interpolation-filters="sRGB"><feGaussianBlur in="SourceGraphic" stdDeviation="9" result="b2"/><feGaussianBlur in="SourceGraphic" stdDeviation="3.2" result="b1"/><feGaussianBlur in="SourceGraphic" stdDeviation="0.9" result="b0"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="b0"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>
        <path d="M26,150 C2,150 -2,120 10,106 C-3,70 24,54 57,60 C52,24 82,7 110,13 C130,5 168,20 169,54 C197,48 220,70 213,100 C225,112 220,150 194,150 Z" fill="#0a2888"/>
        <path d="M26,150 C2,150 -2,120 10,106 C-3,70 24,54 57,60 C52,24 82,7 110,13 C130,5 168,20 169,54 C197,48 220,70 213,100 C225,112 220,150 194,150" fill="none" stroke="#18d8ff" stroke-width="4.5" stroke-linecap="round" filter="url(#neon)"/>
        <path d="M78,108 L110,64 L142,108 L124,108 L124,150 L96,150 L96,108 Z" fill="#0a2888"/>
        <path d="M78,108 L110,64 L142,108 L124,108 L124,150 L96,150 L96,108 Z" fill="none" stroke="#22dcff" stroke-width="4.2" stroke-linejoin="round" filter="url(#neonS)"/>
        <circle cx="110" cy="64" r="7" fill="#70f0ff" filter="url(#neonS)"/>
      </svg>
      <div class="halo"></div>
    </div>

    <div class="hero-label">
      <span class="spul-brand">S-PUL</span>
      <span class="spul-sub">Search Page URL Locator</span>
    </div>

    <!-- Search card -->
    <div class="search-card" id="searchCard">
      <div class="s-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>
      </div>
      <input class="s-input" id="heroInput" type="text"
        placeholder="Pay property taxes Travis County TX · San Diego CA"
        autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="s-btn" id="heroBtn" aria-label="Search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>
      </button>
    </div>

    <div class="hint-row" id="hintRow">Property tax search pages — pay bills, search by owner name</div>
  </div>
</div>

<!-- Chat / results screen -->
<div id="chat-screen" class="screen">
  <div class="chat-header">
    <button class="back-btn" id="backBtn" aria-label="Back">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    </button>
    <span class="chat-brand">S-PUL</span>
    <button class="new-btn" id="newBtn">New</button>
    <button class="index-toggle-btn" id="indexToggleBtn" title="Toggle search index" aria-label="Toggle index sidebar">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    </button>
  </div>

  <div class="chat-body">
    <div class="messages" id="messages"></div>
    <!-- Conversation index sidebar -->
    <aside class="index-sidebar" id="indexSidebar">
      <div class="index-list" id="indexList"></div>
    </aside>
  </div>

  <div class="chat-footer">
    <form class="chat-form" id="chatForm">
      <input class="chat-input" id="chatInput" type="text"
        placeholder="Follow up: search by name, parcel ID..."
        autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="send-btn" type="submit" aria-label="Send">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </form>
  </div>
</div>

<script>
// ─── DOM refs ───────────────────────────────────────────────────────────────
const heroScreen      = document.getElementById('hero-screen');
const chatScreen      = document.getElementById('chat-screen');
const heroInput       = document.getElementById('heroInput');
const heroBtn         = document.getElementById('heroBtn');
const messages        = document.getElementById('messages');
const chatForm        = document.getElementById('chatForm');
const chatInput       = document.getElementById('chatInput');
const backBtn         = document.getElementById('backBtn');
const newBtn          = document.getElementById('newBtn');
const cloudWrap       = document.getElementById('cloudWrap');
const indexSidebar    = document.getElementById('indexSidebar');
const indexList       = document.getElementById('indexList');
const indexToggleBtn  = document.getElementById('indexToggleBtn');

let isStreaming = false;
let indexEntries = [];     // { id, label, url, confidence }
let sidebarVisible = true;
let resultCounter = 0;
let lastLookup = null;     // { county, state, url } for corrections

// ─── Theme detection (respects Mac system preference) ───────────────────────
const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light');

// ─── GSAP entrance animations ────────────────────────────────────────────────
window.addEventListener('load', () => {
  if (typeof gsap === 'undefined') {
    setTimeout(() => cloudWrap.classList.add('floatOn'), 400);
    return;
  }
  gsap.set([cloudWrap, '.hero-label', '.search-card', '.hint-row'], { opacity: 0 });
  const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
  tl.to(cloudWrap,       { opacity: 1, y: 0, duration: 0.7, from: { y: -30 } })
    .to('.hero-label',   { opacity: 1, y: 0, duration: 0.5, from: { y: 14 } }, '-=0.3')
    .to('.search-card',  { opacity: 1, scaleX: 1, duration: 0.5, from: { scaleX: 0.82 } }, '-=0.2')
    .to('.hint-row',     { opacity: 1, duration: 0.4 }, '-=0.1')
    .then(() => cloudWrap.classList.add('floatOn'));
});

// ─── Parse SPUL structured response ─────────────────────────────────────────
function parseSpul(text) {
  if (!text.includes('SPUL_URL:')) return null;
  const get = (key, next) => {
    const re = new RegExp(`${key}:\\s*(.+?)(?=\\nSPUL_|$)`, 's');
    const m = text.match(re);
    return m ? m[1].trim() : '';
  };
  const url        = (text.match(/SPUL_URL:\s*(.+)/) || [])[1]?.trim() || '';
  const entity     = (text.match(/SPUL_ENTITY:\s*(.+)/) || [])[1]?.trim() || '';
  const confidence = (text.match(/SPUL_CONFIDENCE:\s*(.+)/) || [])[1]?.trim() || 'not_found';
  const actionsRaw = get('SPUL_ACTIONS', 'SPUL_CONTEXT');
  const context    = get('SPUL_CONTEXT', '$');
  const actions    = actionsRaw.split('\n')
    .map(l => l.replace(/^[-•*]\s*/, '').trim())
    .filter(Boolean);
  return { url, entity, confidence, actions, context };
}

// ─── Render structured SPUL result card ─────────────────────────────────────
function renderSpulCard(parsed, meta = {}) {
  const confLabel = { verified: 'Verified', pattern_matched: 'Pattern Match', not_found: 'Not Found' };
  const confClass = { verified: 'conf-verified', pattern_matched: 'conf-pattern', not_found: 'conf-notfound' };
  const hostDisplay = (() => {
    try { return new URL(parsed.url).hostname.replace(/^www\./, ''); } catch { return parsed.url; }
  })();

  const actionsHtml = parsed.actions.length
    ? `<div class="action-chips">${parsed.actions.map(a =>
        `<button class="action-chip" data-action="${a}">${a}</button>`).join('')}</div>`
    : '';

  const contextHtml = parsed.context
    ? `<p class="spul-context">${parsed.context}</p>` : '';

  const scenarioBadge = meta.scenarioId
    ? `<span class="scenario-badge">Trained scenario</span>` : '';

  const cardId = 'result-' + (++resultCounter);
  const card = document.createElement('div');
  card.className = 'spul-result-card';
  card.id = cardId;
  card.dataset.county = meta.county || '';
  card.dataset.state = meta.state || '';
  card.dataset.wrongUrl = parsed.url || '';
  const indexLabel = parsed.entity || hostDisplay;
  addToIndex(cardId, indexLabel, parsed.url, parsed.confidence);
  card.innerHTML = `
    <div class="spul-entity-row">
      <span class="spul-entity">${parsed.entity || 'Property Tax Search'}</span>
      <span class="conf-badge ${confClass[parsed.confidence] || 'conf-notfound'}">${confLabel[parsed.confidence] || parsed.confidence}</span>
      ${scenarioBadge}
    </div>
    <a class="spul-url-link" href="${parsed.url}" target="_blank" rel="noopener noreferrer">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      <span>Open Official Tax Search Page</span>
    </a>
    <div class="spul-host">${hostDisplay}</div>
    ${actionsHtml}
    ${contextHtml}
    <button type="button" class="wrong-page-btn">Not the right page</button>
  `;

  card.querySelector('.wrong-page-btn')?.addEventListener('click', () => submitCorrection(card));

  card.querySelectorAll('.action-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      chatInput.value = btn.dataset.action;
      chatInput.focus();
    });
  });

  messages.appendChild(card);
  messages.scrollTop = messages.scrollHeight;
}

// ─── Render plain markdown chat bubble ──────────────────────────────────────
function renderMarkdown(text) {
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>')
    .replace(/(https?:\/\/[^\s<>"]+)/g, (url) => `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`)
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
    .replace(/\n/g, '<br>');
}

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = `msg msg-${role}`;
  div.innerHTML = role === 'ai' ? renderMarkdown(text) : text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return div;
}

// ─── Thinking state cycling label ────────────────────────────────────────────
const THINKING_STATES = [
  'Searching jurisdiction database…',
  'Parsing query…',
  'Cross-referencing SPUL records…',
  'Verifying search URL…',
  'Building result…',
];

function showThinking() {
  const el = document.createElement('div');
  el.className = 'thinking-state';
  el.textContent = THINKING_STATES[0];
  messages.appendChild(el);
  messages.scrollTop = messages.scrollHeight;

  let i = 0;
  const iv = setInterval(() => {
    el.style.opacity = '0';
    setTimeout(() => {
      i = (i + 1) % THINKING_STATES.length;
      el.textContent = THINKING_STATES[i];
      el.style.opacity = '1';
    }, 200);
  }, 900);

  return { el, stop: () => { clearInterval(iv); el.remove(); } };
}

async function submitCorrection(cardEl) {
  const county = cardEl.dataset.county || lastLookup?.jurisdiction?.county;
  const state = cardEl.dataset.state || lastLookup?.jurisdiction?.state;
  const wrongUrl = cardEl.dataset.wrongUrl || '';
  if (!county || !state) {
    alert('Search a county first so we know which jurisdiction to fix.');
    return;
  }
  const searchURL = prompt(`Paste the correct official tax search URL for ${county}, ${state}:`, 'https://');
  if (!searchURL || !/^https?:\/\//i.test(searchURL.trim())) return;
  try {
    const res = await fetch('/api/corrections', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        county,
        state,
        searchURL: searchURL.trim(),
        rejectURLs: wrongUrl ? [wrongUrl] : [],
        source: 'frontend'
      })
    });
    const data = await res.json();
    if (!data.ok) {
      alert(data.error || 'Correction failed');
      return;
    }
    const card = lookupToSpulCard(data.lookup || data);
    if (card) {
      cardEl.querySelector('.spul-url-link')?.setAttribute('href', card.url);
      const host = cardEl.querySelector('.spul-host');
      if (host) {
        try { host.textContent = new URL(card.url).hostname.replace(/^www\./, ''); } catch { host.textContent = card.url; }
      }
      cardEl.dataset.wrongUrl = card.url;
    }
    alert('Correction saved. Next searches will use the verified URL.');
  } catch {
    alert('Could not save correction.');
  }
}

function lookupToSpulCard(lookup) {
  const url = lookup.url || lookup.lockedUrl;
  if (!url || /google\.com\/search/i.test(url)) return null;
  return {
    url,
    entity: lookup.entity || `${lookup.jurisdiction?.county || ''} property tax search`.trim(),
    confidence: lookup.confidence || 'pattern_matched',
    actions: [
      'Search by owner last name',
      'Search by parcel / account number',
      'View tax payment history'
    ],
    context: lookup.entityNote || lookup.source || ''
  };
}

// ─── Core: send message + handle SSE stream ──────────────────────────────────
async function sendMessage(message, options = {}) {
  if (isStreaming) return;
  isStreaming = true;

  addMessage('user', message);
  const thinking = showThinking();

  let fullText = '';
  let lineBuffer = '';
  let fastCardShown = false;
  let prefetchMeta = {};

  try {
  if (!options.skipPrefetch) {
    try {
      const lookupRes = await fetch(`/api/lookup?q=${encodeURIComponent(message)}`);
      if (lookupRes.ok) {
        const lookup = await lookupRes.json();
        lastLookup = lookup;
        const dbHit =
          lookup.urlLocked ||
          (lookup.confidence !== 'not_found' && lookup.url && !/google\.com\/search/i.test(lookup.url));
        if (dbHit) {
          const card = lookupToSpulCard(lookup);
          if (card) {
            prefetchMeta = {
              scenarioId: lookup.scenarioId,
              county: lookup.jurisdiction?.county,
              state: lookup.jurisdiction?.state
            };
            renderSpulCard(card, prefetchMeta);
            fastCardShown = true;
          }
        }
      }
    } catch { /* lookup optional */ }
  }

    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message }),
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const reader = res.body.getReader();
    const decoder = new TextDecoder();

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      lineBuffer += decoder.decode(value, { stream: true });
      const lines = lineBuffer.split('\n');
      lineBuffer = lines.pop(); // keep incomplete line
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const ev = JSON.parse(line.slice(6));
          if (ev.type === 'chunk') fullText += ev.content;
          if (ev.type === 'error') fullText += ev.content;
        } catch {}
      }
    }

    thinking.stop();

    const spul = parseSpul(fullText);
    if (spul && spul.url) {
      if (fastCardShown) {
        const lastCard = messages.querySelector('.spul-result-card:last-of-type');
        if (lastCard && spul.context) {
          let ctx = lastCard.querySelector('.spul-context');
          if (!ctx) {
            ctx = document.createElement('p');
            ctx.className = 'spul-context';
            lastCard.insertBefore(ctx, lastCard.querySelector('.wrong-page-btn'));
          }
          ctx.textContent = spul.context;
        }
      } else {
        renderSpulCard(spul, {
          ...prefetchMeta,
          county: prefetchMeta.county || lastLookup?.jurisdiction?.county,
          state: prefetchMeta.state || lastLookup?.jurisdiction?.state
        });
      }
    } else if (!fastCardShown) {
      addMessage('ai', fullText || 'No result returned.');
    }

  } catch (err) {
    thinking.stop();
    addMessage('ai', 'Connection error — please try again.');
  } finally {
    isStreaming = false;
    chatInput.focus();
  }
}

// ─── Sidebar index ───────────────────────────────────────────────────────────
function addToIndex(id, label, url, confidence) {
  indexEntries.push({ id, label, url, confidence });
  const dot = confidence === 'verified' ? '🟢' : confidence === 'pattern_matched' ? '🟡' : '🔴';
  const item = document.createElement('a');
  item.className = 'index-entry';
  item.href = '#' + id;
  item.innerHTML = `<span class="idx-dot">${dot}</span><span class="idx-label">${label}</span>`;
  item.addEventListener('click', e => {
    e.preventDefault();
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });
  indexList.appendChild(item);
  if (indexEntries.length >= 1 && sidebarVisible) {
    indexSidebar.classList.add('has-entries');
  }
}

function clearIndex() {
  indexEntries = [];
  indexList.innerHTML = '';
  indexSidebar.classList.remove('has-entries');
  resultCounter = 0;
}

indexToggleBtn.addEventListener('click', () => {
  sidebarVisible = !sidebarVisible;
  indexSidebar.classList.toggle('hidden', !sidebarVisible);
  indexToggleBtn.classList.toggle('active', sidebarVisible);
});

// ─── Navigation ──────────────────────────────────────────────────────────────
function goToChat() {
  if (typeof gsap !== 'undefined') {
    // Animate hero up and out, then show chat
    gsap.to(heroScreen, {
      opacity: 0, y: -28, duration: 0.32, ease: 'power2.in',
      onComplete: () => {
        heroScreen.classList.remove('active');
        chatScreen.classList.add('active');
        gsap.fromTo(chatScreen,
          { opacity: 0, y: 18 },
          { opacity: 1, y: 0, duration: 0.38, ease: 'power3.out' }
        );
        setTimeout(() => chatInput.focus(), 100);
      }
    });
  } else {
    heroScreen.classList.remove('active');
    chatScreen.classList.add('active');
    setTimeout(() => chatInput.focus(), 100);
  }
}

function goToHero() {
  if (typeof gsap !== 'undefined') {
    gsap.to(chatScreen, {
      opacity: 0, y: 18, duration: 0.25, ease: 'power2.in',
      onComplete: () => {
        chatScreen.classList.remove('active');
        heroScreen.classList.add('active');
        gsap.set(heroScreen, { opacity: 0, y: -20 });
        gsap.to(heroScreen, { opacity: 1, y: 0, duration: 0.38, ease: 'power3.out' });
        setTimeout(() => heroInput.focus(), 100);
      }
    });
  } else {
    chatScreen.classList.remove('active');
    heroScreen.classList.add('active');
    setTimeout(() => heroInput.focus(), 100);
  }
}

heroBtn.addEventListener('click', () => {
  const q = heroInput.value.trim();
  if (!q) return;
  messages.innerHTML = '';
  goToChat();
  sendMessage(q);
  heroInput.value = '';
});

heroInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') heroBtn.click();
});

chatForm.addEventListener('submit', e => {
  e.preventDefault();
  const q = chatInput.value.trim();
  if (q) { sendMessage(q); chatInput.value = ''; }
});

backBtn.addEventListener('click', goToHero);

newBtn.addEventListener('click', async () => {
  await fetch('/api/new-search', { method: 'POST' });
  messages.innerHTML = '';
  clearIndex();
});

// ─── Restore session ─────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  fetch('/api/hero-examples').then(r => r.json()).then(data => {
    if (data.examples?.length && heroInput) {
      heroInput.placeholder = data.examples[0];
      const hint = document.getElementById('hintRow');
      if (hint) hint.textContent = 'Try: ' + data.examples.slice(0, 3).join(' · ');
    }
  }).catch(() => {});

  fetch('/api/history').then(r => r.json()).then(data => {
    if (data.history && data.history.length > 0) {
      goToChat();
      // Replay history display
      data.history.forEach(m => {
        const role = m.role === 'user' ? 'user' : 'ai';
        const spul = role === 'ai' ? parseSpul(m.content) : null;
        if (spul && spul.url) renderSpulCard(spul);
        else addMessage(role, m.content);
      });
    }
  }).catch(() => {});
});
</script>
</body>
</html>
